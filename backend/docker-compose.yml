version: "3.9"

services:
  db:
    image: postgres:16
    container_name: greenpoints_db
    restart: always
    environment:
      POSTGRES_USER: greenpoints
      POSTGRES_PASSWORD: greenpoints123
      POSTGRES_DB: greenpoints
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: